<div class="app-layout">
    <!-- Header Component -->
    <app-header 
        [isAuthenticated]="isAuthenticated"
        [showSettings]="showSettings"
        (toggleSettings)="toggleSettings()"
        (logout)="logout()">
    </app-header>

    <!-- Main Content Area -->
    <main [class.app-main]="isAuthenticated" [class.app-main-no-sidebar]="!isAuthenticated">
        <div class="content-wrapper">
            <router-outlet></router-outlet>
        </div>
    </main>
</div>

<app-toast></app-toast>
<app-confirm-dialog></app-confirm-dialog>
<app-settings-panel *ngIf="showSettings" (close)="closeSettings()"></app-settings-panel>
<app-scroll-to-top *ngIf="isAuthenticated"></app-scroll-to-top>
