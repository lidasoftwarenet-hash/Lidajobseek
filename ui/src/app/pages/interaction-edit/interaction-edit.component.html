<div class="form-view" *ngIf="interaction">
    <header class="view-header">
        <nav class="breadcrumb" aria-label="Breadcrumb">
            <a class="breadcrumb-link" [routerLink]="['/process', processId]">← Back to process</a>
        </nav>
        <h1>Edit Interaction</h1>
        <p class="subtitle">Update session details.</p>
    </header>

    <form #interactionForm="ngForm" (ngSubmit)="onSubmit()" class="data-form">
        <div class="form-section">
            <!-- Date / Time / Type row -->
            <div class="form-row three-col">
                <div class="form-group">
                    <label>Date</label>
                    <div class="input-icon-wrapper">
                        <input type="text" [value]="datePart | dateFormat:'date'" (click)="datePicker.showPicker()"
                            class="input-field date-display" placeholder="Select date" readonly>
                        <input #datePicker type="date" name="datePart" [(ngModel)]="datePart"
                            (change)="updateDateTime()" class="input-field date-input hidden-picker" required>
                        <span class="field-icon" (click)="datePicker.showPicker()">📅</span>
                    </div>
                </div>

                <div class="form-group">
                    <label>Time</label>
                    <div class="input-icon-wrapper">
                        <input #timePicker type="time" name="timePart" [(ngModel)]="timePart"
                            (change)="updateDateTime()" class="input-field date-input" required>
                        <span class="field-icon" (click)="timePicker.showPicker()">⏰</span>
                    </div>
                </div>

                <div class="form-group type-group">
                    <label>Interview Type</label>
                    <select name="interviewType" [(ngModel)]="interaction.interviewType" class="input-field" required>
                        <option *ngFor="let type of interviewTypes" [value]="type.id">{{ type.label }}</option>
                    </select>
                </div>
            </div>

            <!-- Participants -->
            <div class="interviewers-block">
                <div class="section-label-row">
                    <label>Participants</label>
                    <button type="button" class="btn-text" (click)="addParticipant()">+ Add Person</button>
                </div>

                <div class="participants-list">
                    <div *ngFor="let p of interaction.participants; let i = index" class="participant-row">
                        <select [name]="'role' + i" [(ngModel)]="p.role" class="input-field small-select">
                            <option *ngFor="let role of availableRoles" [value]="role">{{role}}</option>
                        </select>
                        <input type="text" [name]="'name' + i" [(ngModel)]="p.name" placeholder="Full name"
                            class="input-field">
                        <button type="button" class="btn-remove" (click)="removeParticipant(i)" title="Remove">&times;</button>
                    </div>
                    <p class="muted-hint" *ngIf="interaction.participants?.length === 0">No participants added yet.</p>
                </div>
            </div>

            <div class="form-group">
                <label for="summary">Summary <span class="required">*</span></label>
                <textarea id="summary" name="summary" [(ngModel)]="interaction.summary" rows="4" required
                    placeholder="What was discussed? Key themes, tone, signals..." class="input-field" autofocus></textarea>
            </div>

            <div class="form-group">
                <label for="testsAssessment">Tests / Technical Assessment</label>
                <textarea id="testsAssessment" name="testsAssessment" [(ngModel)]="interaction.testsAssessment" rows="2"
                    placeholder="Describe any coding challenges, system design questions, or technical tasks..."
                    class="input-field"></textarea>
            </div>

            <div class="form-group">
                <label for="roleInsights">Role Insights</label>
                <textarea id="roleInsights" name="roleInsights" [(ngModel)]="interaction.roleInsights" rows="2"
                    placeholder="What did you learn about the team, projects, or culture?"
                    class="input-field"></textarea>
            </div>

            <div class="form-group">
                <label for="notes">Private Notes</label>
                <textarea id="notes" name="notes" [(ngModel)]="interaction.notes" rows="2"
                    placeholder="Personal impressions, follow-up actions, red flags..." class="input-field"></textarea>
            </div>
        </div>

        <div class="form-actions">
            <button type="button" class="btn-secondary" [routerLink]="['/process', processId]">Cancel</button>
            <button type="submit" class="btn-primary" [disabled]="!interactionForm.form.valid">Save Changes</button>
        </div>
    </form>
</div>
