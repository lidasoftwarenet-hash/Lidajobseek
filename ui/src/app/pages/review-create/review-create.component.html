<div class="form-view">
    <header class="view-header">
        <h1>Self Review</h1>
        <p class="subtitle">Reflect on the session. Write short bullets, not essays.</p>
    </header>

    <form #reviewForm="ngForm" (ngSubmit)="onSubmit()" class="data-form">
        <div class="form-section">
            <div class="form-row">
                <div class="form-group">
                    <label for="stage">Interview Stage</label>
                    <input id="stage" type="text" name="stage" [(ngModel)]="review.stage" required
                        placeholder="e.g. Technical Round 1" class="input-field" autofocus>
                </div>

                <div class="form-group">
                    <label for="confidence">Confidence</label>
                    <select id="confidence" name="confidence" [(ngModel)]="review.confidence" class="input-field">
                        <option [ngValue]="1">1 — Poor</option>
                        <option [ngValue]="2">2 — Fair</option>
                        <option [ngValue]="3">3 — Good</option>
                        <option [ngValue]="4">4 — Very Good</option>
                        <option [ngValue]="5">5 — Excellent</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label for="whatWentWell">What Went Well?</label>
                <textarea id="whatWentWell" name="whatWentWell" [(ngModel)]="review.whatWentWell" rows="3" required
                    placeholder="Key wins from this round..." class="input-field"></textarea>
            </div>

            <div class="form-group">
                <label for="whatFailed">What Could Be Better?</label>
                <textarea id="whatFailed" name="whatFailed" [(ngModel)]="review.whatFailed" rows="3" required
                    placeholder="Where you struggled or got caught off guard..." class="input-field"></textarea>
            </div>

            <div class="form-group">
                <label for="gaps">Knowledge Gaps to Close</label>
                <textarea id="gaps" name="gaps" [(ngModel)]="review.gaps" rows="2" required
                    placeholder="Topics or skills to prepare for the next round..." class="input-field"></textarea>
            </div>
        </div>

        <div class="form-actions">
            <button type="button" class="btn-secondary" [routerLink]="['/process', processId]">Cancel</button>
            <button type="submit" class="btn-primary" [disabled]="!reviewForm.form.valid">Save Review</button>
        </div>
    </form>
</div>
